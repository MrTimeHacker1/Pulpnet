<svg viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="abg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f1420"/>
      <stop offset="1" stop-color="#0c1019"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c6cff"/>
      <stop offset="1" stop-color="#39d3bb"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5a6688"/>
    </marker>
  </defs>

  <rect width="1200" height="760" fill="url(#abg)"/>
  <text x="40" y="50" font-size="26" font-weight="800" fill="#ffffff" letter-spacing="-0.5">System Architecture</text>
  <text x="40" y="76" font-size="14" fill="#8a95b3">Request lifecycle from client through the agentic graph to a grounded, cited response</text>
  <rect x="40" y="90" width="120" height="3" rx="1.5" fill="url(#accent2)"/>

  <!-- ===== Client ===== -->
  <g>
    <rect x="40" y="120" width="180" height="64" rx="10" fill="#161d2e" stroke="#2c3654"/>
    <text x="130" y="150" text-anchor="middle" font-size="16" font-weight="700" fill="#e6ebf7">Client</text>
    <text x="130" y="170" text-anchor="middle" font-size="12" fill="#7e89a8">Web · Mobile · API</text>
  </g>

  <!-- ===== API layer ===== -->
  <g>
    <rect x="300" y="112" width="860" height="80" rx="12" fill="#13192a" stroke="#283353"/>
    <text x="320" y="138" font-size="13" font-weight="700" fill="#7c6cff" letter-spacing="1">FASTAPI BACKEND</text>
    <g font-size="12.5" font-weight="600" fill="#c8d2ea">
      <rect x="320" y="150" width="150" height="30" rx="8" fill="#1b2540" stroke="#2f3c5c"/>
      <text x="395" y="170" text-anchor="middle">Rate Limiter</text>
      <rect x="486" y="150" width="160" height="30" rx="8" fill="#1b2540" stroke="#2f3c5c"/>
      <text x="566" y="170" text-anchor="middle">Input Guardrails</text>
      <rect x="662" y="150" width="180" height="30" rx="8" fill="#1b2540" stroke="#2f3c5c"/>
      <text x="752" y="170" text-anchor="middle">Semantic Cache Lookup</text>
      <rect x="858" y="150" width="160" height="30" rx="8" fill="#1b2540" stroke="#2f3c5c"/>
      <text x="938" y="170" text-anchor="middle">Output Guardrails</text>
    </g>
  </g>

  <!-- ===== LangGraph ===== -->
  <g>
    <rect x="300" y="222" width="860" height="150" rx="12" fill="#13192a" stroke="#283353"/>
    <text x="320" y="248" font-size="13" font-weight="700" fill="#39d3bb" letter-spacing="1">LANGGRAPH AGENT PIPELINE</text>

    <g font-size="12.5" font-weight="600">
      <!-- node template -->
      <rect x="320" y="262" width="118" height="44" rx="9" fill="#1a2238" stroke="#34406a"/>
      <text x="379" y="282" text-anchor="middle" fill="#e6ebf7">Intent</text>
      <text x="379" y="298" text-anchor="middle" fill="#8893b2" font-size="11">Router</text>

      <rect x="452" y="262" width="118" height="44" rx="9" fill="#1a2238" stroke="#34406a"/>
      <text x="511" y="282" text-anchor="middle" fill="#e6ebf7">Query</text>
      <text x="511" y="298" text-anchor="middle" fill="#8893b2" font-size="11">Rewriter</text>

      <rect x="584" y="262" width="118" height="44" rx="9" fill="#1a2238" stroke="#34406a"/>
      <text x="643" y="282" text-anchor="middle" fill="#e6ebf7">Decomposer</text>
      <text x="643" y="298" text-anchor="middle" fill="#8893b2" font-size="11">multi-part</text>

      <rect x="716" y="262" width="118" height="44" rx="9" fill="#1a2238" stroke="#34406a"/>
      <text x="775" y="282" text-anchor="middle" fill="#e6ebf7">Retriever</text>
      <text x="775" y="298" text-anchor="middle" fill="#8893b2" font-size="11">hybrid</text>

      <rect x="848" y="262" width="118" height="44" rx="9" fill="#1a2238" stroke="#34406a"/>
      <text x="907" y="282" text-anchor="middle" fill="#e6ebf7">Synthesizer</text>
      <text x="907" y="298" text-anchor="middle" fill="#8893b2" font-size="11">grounded</text>

      <rect x="980" y="262" width="160" height="44" rx="9" fill="#16213a" stroke="#2a3658"/>
      <text x="1060" y="282" text-anchor="middle" fill="#e6ebf7">Citation +</text>
      <text x="1060" y="298" text-anchor="middle" fill="#8893b2" font-size="11">Evidence Verify</text>
    </g>

    <!-- arrows between nodes -->
    <g stroke="#5a6688" stroke-width="1.6" marker-end="url(#arrow)">
      <line x1="438" y1="284" x2="450" y2="284"/>
      <line x1="570" y1="284" x2="582" y2="284"/>
      <line x1="702" y1="284" x2="714" y2="284"/>
      <line x1="834" y1="284" x2="846" y2="284"/>
      <line x1="966" y1="284" x2="978" y2="284"/>
    </g>

    <text x="320" y="344" font-size="11.5" fill="#6b7693">LLM-backed nodes call the provider-agnostic factory · conditional routing exits early for out-of-scope queries</text>
  </g>

  <!-- ===== Retrieval engine ===== -->
  <g>
    <rect x="300" y="402" width="555" height="150" rx="12" fill="#13192a" stroke="#283353"/>
    <text x="320" y="428" font-size="13" font-weight="700" fill="#7c6cff" letter-spacing="1">HYBRID RETRIEVAL ENGINE</text>
    <g font-size="12" font-weight="600" fill="#cdd6ee">
      <rect x="320" y="442" width="120" height="38" rx="8" fill="#1b2540" stroke="#2f3c5c"/>
      <text x="380" y="465" text-anchor="middle">Dense (e5)</text>
      <rect x="320" y="490" width="120" height="38" rx="8" fill="#1b2540" stroke="#2f3c5c"/>
      <text x="380" y="513" text-anchor="middle">Sparse (SPLADE)</text>
      <rect x="470" y="466" width="110" height="38" rx="8" fill="#1b2540" stroke="#2f3c5c"/>
      <text x="525" y="489" text-anchor="middle">RRF Fusion</text>
      <rect x="610" y="466" width="110" height="38" rx="8" fill="#1b2540" stroke="#2f3c5c"/>
      <text x="665" y="489" text-anchor="middle">Re-ranker</text>
      <rect x="746" y="466" width="92" height="38" rx="8" fill="#21304f" stroke="#3a4a78"/>
      <text x="792" y="489" text-anchor="middle" fill="#39d3bb">Top-k</text>
    </g>
    <g stroke="#5a6688" stroke-width="1.6" marker-end="url(#arrow)">
      <line x1="440" y1="461" x2="468" y2="478"/>
      <line x1="440" y1="509" x2="468" y2="492"/>
      <line x1="580" y1="485" x2="608" y2="485"/>
      <line x1="720" y1="485" x2="744" y2="485"/>
    </g>
  </g>

  <!-- ===== Datastores ===== -->
  <g>
    <rect x="885" y="402" width="275" height="150" rx="12" fill="#13192a" stroke="#283353"/>
    <text x="905" y="428" font-size="13" font-weight="700" fill="#39d3bb" letter-spacing="1">DATA STORES</text>
    <g font-size="12.5" font-weight="600" fill="#cdd6ee">
      <rect x="905" y="442" width="235" height="30" rx="7" fill="#1b2540" stroke="#2f3c5c"/>
      <text x="918" y="462" fill="#c8d2ea">Qdrant · dense + sparse vectors</text>
      <rect x="905" y="478" width="235" height="30" rx="7" fill="#1b2540" stroke="#2f3c5c"/>
      <text x="918" y="498" fill="#c8d2ea">PostgreSQL · metadata, chats</text>
      <rect x="905" y="514" width="235" height="30" rx="7" fill="#1b2540" stroke="#2f3c5c"/>
      <text x="918" y="534" fill="#c8d2ea">Redis Stack · cache, sessions</text>
    </g>
  </g>

  <!-- ===== Ingestion ===== -->
  <g>
    <rect x="40" y="402" width="230" height="320" rx="12" fill="#13192a" stroke="#283353"/>
    <text x="60" y="428" font-size="13" font-weight="700" fill="#39d3bb" letter-spacing="1">INGESTION</text>
    <g font-size="12.5" font-weight="600" fill="#c8d2ea">
      <rect x="60" y="442" width="190" height="34" rx="8" fill="#1b2540" stroke="#2f3c5c"/>
      <text x="155" y="464" text-anchor="middle">Crawler (Playwright)</text>
      <rect x="60" y="484" width="190" height="34" rx="8" fill="#1b2540" stroke="#2f3c5c"/>
      <text x="155" y="506" text-anchor="middle">PDF Downloader + Parser</text>
      <rect x="60" y="526" width="190" height="34" rx="8" fill="#1b2540" stroke="#2f3c5c"/>
      <text x="155" y="548" text-anchor="middle">Markdown Cleaner</text>
      <rect x="60" y="568" width="190" height="34" rx="8" fill="#1b2540" stroke="#2f3c5c"/>
      <text x="155" y="590" text-anchor="middle">Date / Dept Detector</text>
      <rect x="60" y="610" width="190" height="34" rx="8" fill="#1b2540" stroke="#2f3c5c"/>
      <text x="155" y="632" text-anchor="middle">Recursive Chunker</text>
      <rect x="60" y="652" width="190" height="34" rx="8" fill="#21304f" stroke="#3a4a78"/>
      <text x="155" y="674" text-anchor="middle" fill="#39d3bb">Embed → Index</text>
    </g>
    <g stroke="#5a6688" stroke-width="1.4" marker-end="url(#arrow)">
      <line x1="155" y1="476" x2="155" y2="483"/>
      <line x1="155" y1="518" x2="155" y2="525"/>
      <line x1="155" y1="560" x2="155" y2="567"/>
      <line x1="155" y1="602" x2="155" y2="609"/>
      <line x1="155" y1="644" x2="155" y2="651"/>
    </g>
  </g>

  <!-- ===== Observability ===== -->
  <g>
    <rect x="300" y="582" width="860" height="56" rx="12" fill="#13192a" stroke="#283353"/>
    <text x="320" y="606" font-size="13" font-weight="700" fill="#7c6cff" letter-spacing="1">OBSERVABILITY</text>
    <g font-size="12.5" font-weight="600" fill="#c8d2ea">
      <text x="470" y="616" fill="#c8d2ea">Prometheus</text>
      <text x="600" y="616" fill="#c8d2ea">Grafana</text>
      <text x="710" y="616" fill="#c8d2ea">MLflow</text>
      <text x="820" y="616" fill="#c8d2ea">RAGAs Eval</text>
      <text x="960" y="616" fill="#c8d2ea">Structured Logs</text>
    </g>
  </g>
  <g>
    <rect x="300" y="650" width="860" height="56" rx="12" fill="#13192a" stroke="#283353"/>
    <text x="320" y="674" font-size="13" font-weight="700" fill="#39d3bb" letter-spacing="1">LLM PROVIDER</text>
    <g font-size="12.5" font-weight="600" fill="#c8d2ea">
      <text x="470" y="684" fill="#8893b2">via factory →</text>
      <text x="580" y="684">Ollama (local)</text>
      <text x="710" y="684">Gemini</text>
      <text x="800" y="684">OpenAI</text>
      <text x="890" y="684">Claude</text>
      <text x="980" y="684" fill="#8893b2">swap by config</text>
    </g>
  </g>

  <!-- top-level flow arrows -->
  <g stroke="#5a6688" stroke-width="1.8" marker-end="url(#arrow)">
    <line x1="220" y1="152" x2="298" y2="152"/>
    <line x1="730" y1="192" x2="730" y2="220"/>
    <line x1="775" y1="372" x2="775" y2="400"/>
    <line x1="855" y1="477" x2="883" y2="477"/>
  </g>
</svg>
