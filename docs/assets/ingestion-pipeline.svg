<svg viewBox="0 0 920 532" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="ia" markerWidth="12" markerHeight="12" refX="6" refY="5" orient="auto">
      <path d="M1,1 L9,5 L1,9" fill="none" stroke="#8a93a8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="920" height="532" fill="#0d0d0f"/>

  <text x="40" y="48" font-size="20" font-weight="800" fill="#ffffff">Ingestion Pipeline</text>
  <text x="40" y="70" font-size="12.5" fill="#8a93a8">Web pages and PDFs share one path: clean → enrich → chunk → embed → index</text>

  <!-- SOURCES band (teal) -->
  <g>
    <rect x="40" y="92" width="840" height="92" rx="10" fill="#0f6b54"/>
    <text x="60" y="117" font-size="15" font-weight="700" fill="#d7f5ec">Sources</text>
    <rect x="58" y="128" width="395" height="44" rx="7" fill="#0b4d3d" stroke="#1c7a61"/>
    <text x="255" y="148" text-anchor="middle" font-size="13.5" font-weight="700" fill="#eafaf5">Websites</text>
    <text x="255" y="165" text-anchor="middle" font-size="10.5" fill="#9fd8c8">Playwright render + Trafilatura → markdown</text>
    <rect x="465" y="128" width="397" height="44" rx="7" fill="#0b4d3d" stroke="#1c7a61"/>
    <text x="663" y="148" text-anchor="middle" font-size="13.5" font-weight="700" fill="#eafaf5">PDFs</text>
    <text x="663" y="165" text-anchor="middle" font-size="10.5" fill="#9fd8c8">download (checksum-deduped) + PyMuPDF parse</text>
  </g>

  <!-- PROCESS band (purple) -->
  <g>
    <rect x="40" y="206" width="840" height="100" rx="10" fill="#3b2d8f"/>
    <text x="60" y="231" font-size="15" font-weight="700" fill="#dcd6f7">Processing</text>

    <rect x="58" y="244" width="180" height="48" rx="7" fill="#2a2068" stroke="#5446b0"/>
    <text x="148" y="265" text-anchor="middle" font-size="13" font-weight="700" fill="#eae6fb">Clean</text>
    <text x="148" y="281" text-anchor="middle" font-size="10.5" fill="#b3aae0">strip nav / image junk</text>

    <rect x="250" y="244" width="180" height="48" rx="7" fill="#2a2068" stroke="#5446b0"/>
    <text x="340" y="265" text-anchor="middle" font-size="13" font-weight="700" fill="#eae6fb">Enrich</text>
    <text x="340" y="281" text-anchor="middle" font-size="10.5" fill="#b3aae0">department + year detect</text>

    <rect x="442" y="244" width="190" height="48" rx="7" fill="#2a2068" stroke="#5446b0"/>
    <text x="537" y="265" text-anchor="middle" font-size="13" font-weight="700" fill="#eae6fb">Chunk</text>
    <text x="537" y="281" text-anchor="middle" font-size="10.5" fill="#b3aae0">recursive · parent/child</text>

    <rect x="644" y="244" width="218" height="48" rx="7" fill="#2a2068" stroke="#5446b0"/>
    <text x="753" y="265" text-anchor="middle" font-size="13" font-weight="700" fill="#eae6fb">Embed</text>
    <text x="753" y="281" text-anchor="middle" font-size="10.5" fill="#b3aae0">dense (e5) + sparse (SPLADE)</text>

    <g marker-end="url(#ia)" stroke="#8a93a8" stroke-width="1.6">
      <line x1="238" y1="268" x2="248" y2="268"/>
      <line x1="430" y1="268" x2="440" y2="268"/>
      <line x1="632" y1="268" x2="642" y2="268"/>
    </g>
  </g>

  <!-- INDEX band (amber) -->
  <g>
    <rect x="40" y="328" width="840" height="74" rx="10" fill="#7a5114"/>
    <text x="60" y="351" font-size="15" font-weight="700" fill="#f6e4c0">Index</text>
    <rect x="58" y="358" width="395" height="34" rx="7" fill="#573a0e" stroke="#946523"/>
    <text x="255" y="380" text-anchor="middle" font-size="12.5" font-weight="700" fill="#fbf0d8">Qdrant · dense + sparse vectors + payload</text>
    <rect x="465" y="358" width="397" height="34" rx="7" fill="#573a0e" stroke="#946523"/>
    <text x="663" y="380" text-anchor="middle" font-size="12.5" font-weight="700" fill="#fbf0d8">PostgreSQL · chunk records + lineage</text>
  </g>

  <!-- METADATA band (blue) -->
  <g>
    <rect x="40" y="424" width="840" height="86" rx="10" fill="#15487f"/>
    <text x="60" y="449" font-size="14" font-weight="700" fill="#cfe3fb">Chunk metadata payload — filterable at query time</text>
    <g font-size="11" font-weight="600">
      <rect x="58" y="462" width="118" height="26" rx="13" fill="#0f3460" stroke="#2766a3"/><text x="117" y="479" text-anchor="middle" fill="#cfe3fb">source_url</text>
      <rect x="184" y="462" width="110" height="26" rx="13" fill="#0f3460" stroke="#2766a3"/><text x="239" y="479" text-anchor="middle" fill="#cfe3fb">department</text>
      <rect x="302" y="462" width="124" height="26" rx="13" fill="#0f3460" stroke="#2766a3"/><text x="364" y="479" text-anchor="middle" fill="#cfe3fb">document_type</text>
      <rect x="434" y="462" width="126" height="26" rx="13" fill="#114e3f" stroke="#2aa07f"/><text x="497" y="479" text-anchor="middle" fill="#7df0cf">document_year</text>
      <rect x="568" y="462" width="104" height="26" rx="13" fill="#114e3f" stroke="#2aa07f"/><text x="620" y="479" text-anchor="middle" fill="#7df0cf">is_outdated</text>
      <rect x="680" y="462" width="110" height="26" rx="13" fill="#0f3460" stroke="#2766a3"/><text x="735" y="479" text-anchor="middle" fill="#cfe3fb">course_code</text>
    </g>
  </g>

  <!-- band arrows -->
  <g marker-end="url(#ia)" stroke="#8a93a8" stroke-width="1.8">
    <line x1="460" y1="184" x2="460" y2="204"/>
    <line x1="460" y1="306" x2="460" y2="326"/>
    <line x1="460" y1="402" x2="460" y2="422"/>
  </g>
</svg>
