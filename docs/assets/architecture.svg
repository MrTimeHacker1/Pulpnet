  <g>
    <rect x="150" y="286" width="640" height="58" rx="10" fill="#7a2330"/>
    <text x="470" y="312" text-anchor="middle" font-size="15.5" font-weight="700" fill="#f7d7db">Input guardrail — safety + PII</text>
    <text x="470" y="331" text-anchor="middle" font-size="11.5" fill="#e3a9b0">LLM injection/jailbreak check · Presidio PII redaction · runs before the agent pipeline</text>
  </g>

